<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIMHAN STORE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:65px;
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    z-index:1000;
}

.logo{
    color:#ff6600;
    font-size:22px;
    font-weight:bold;
}

.menu{
    font-size:28px;
    cursor:pointer;
}

.icons{
    display:flex;
    gap:15px;
    font-size:24px;
    cursor:pointer;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    left:-260px;
    top:0;
    width:250px;
    height:100%;
    background:#fff;
    transition:.3s;
    z-index:2000;
}

.sidebar.active{
    left:0;
}

.sidebar h2{
    background:#ff6600;
    color:#fff;
    padding:20px;
}

.sidebar a{
    display:block;
    padding:15px;
    text-decoration:none;
    color:#333;
    border-bottom:1px solid #eee;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    display:none;
    z-index:1500;
}

.overlay.active{
    display:block;
}

/* SEARCH */

.searchBox{
    margin-top:75px;
    padding:10px;
}

.searchBox input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

/* PRODUCTS */

.products{
    margin-top:10px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:10px;
}

.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:170px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.title{
    font-weight:bold;
}

.price{
    color:#ff6600;
    margin-top:5px;
    font-weight:bold;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.bottomNav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:60px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -2px 8px rgba(0,0,0,.2);
}

.nav{
    text-align:center;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<h2>GIMHAN STORE</h2>

<a href="#" onclick="showPage('home')">🏠 Home</a>

<a href="#" onclick="showPage('cart')">🛒 Cart</a>

<a href="#" onclick="showPage('best')">⭐ Best</a>

</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="header">

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="logo">
GIMHAN STORE
</div>

<div class="icons">

<span onclick="toggleSearch()">🔍</span>

<span onclick="showPage('cart')">
🛒
<span id="cartCount">0</span>
</span>

</div>

</div>

<div class="searchBox" id="searchBox">

<input
type="text"
id="searchInput"
placeholder="Search products...">

</div>

<div class="page active" id="home">

<div class="products" id="productGrid"></div>

</div>

<div class="page" id="cart">

<h2 style="padding:15px;">Shopping Cart</h2>

<div id="cartItems"></div>

</div>

<div class="page" id="best">

<h2 style="padding:15px;">Best Sellers</h2>

<div class="products" id="bestGrid"></div>

</div>

<div class="bottomNav">

<div class="nav" onclick="showPage('home')">
🏠
<br>
Home
</div>

<div class="nav" onclick="showPage('best')">
⭐
<br>
Best
</div>

<div class="nav" onclick="showPage('cart')">
🛒
<br>
Cart
</div>

</div>

<script>
    // =========================
// SIDEBAR
// =========================
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleMenu() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

// =========================
// SEARCH BOX
// =========================
function toggleSearch() {
    document.getElementById("searchInput").focus();
}

// =========================
// PAGE CHANGE
// =========================
function showPage(pageId) {

    document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active");
    });

    document.getElementById(pageId).classList.add("active");

    sidebar.classList.remove("active");
    overlay.classList.remove("active");
}

// =========================
// PRODUCTS
// =========================
const products = [

{
id:1,
name:"Army Soldier",
price:4500,
image:"https://picsum.photos/300?random=1",
description:"High quality Army Soldier Figure."
},

{
id:2,
name:"Toy Gun",
price:3200,
image:"https://picsum.photos/300?random=2",
description:"Premium Toy Gun."
},

{
id:3,
name:"Military Bag",
price:5500,
image:"https://picsum.photos/300?random=3",
description:"Military Backpack."
},

{
id:4,
name:"Helmet",
price:6200,
image:"https://picsum.photos/300?random=4",
description:"Army Helmet."
},

{
id:5,
name:"Boots",
price:7900,
image:"https://picsum.photos/300?random=5",
description:"Military Boots."
},

{
id:6,
name:"Camping Tent",
price:9800,
image:"https://picsum.photos/300?random=6",
description:"Camping Tent."
}

];

// =========================
// PRODUCT GRID
// =========================
const productGrid = document.getElementById("productGrid");

function loadProducts(list){

    productGrid.innerHTML="";

    list.forEach(product=>{

        productGrid.innerHTML += `

<div class="card" onclick="openProduct(${product.id})">

<img src="${product.image}">

<div class="info">

<div class="title">
${product.name}
</div>

<div class="price">
Rs.${product.price}
</div>

</div>

</div>

`;

    });

}

loadProducts(products);

// =========================
// SEARCH
// =========================
document
.getElementById("searchInput")
.addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

let result=products.filter(product=>

product.name.toLowerCase().includes(keyword)

);

loadProducts(result);

});
    // =========================
// CART
// =========================
let cart = [];

// =========================
// PRODUCT DETAIL
// =========================
function openProduct(id){

    const product = products.find(p => p.id === id);

    document.getElementById("home").innerHTML = `

    <div class="detail-card" style="padding:15px;">

        <img src="${product.image}"
             style="width:100%;border-radius:10px;">

        <h2 style="margin-top:10px;">
            ${product.name}
        </h2>

        <h3 style="color:#ff6600;margin-top:8px;">
            Rs.${product.price}
        </h3>

        <p style="margin-top:10px;">
            ${product.description}
        </p>

        <button
        onclick="addToCart(${product.id})"
        style="
        width:100%;
        padding:12px;
        margin-top:15px;
        background:#ff6600;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;">
        🛒 Add To Cart
        </button>

        <button
        onclick="buyNow(${product.id})"
        style="
        width:100%;
        padding:12px;
        margin-top:10px;
        background:#25D366;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;">
        💬 Buy Now
        </button>

        <button
        onclick="loadProducts(products)"
        style="
        width:100%;
        padding:12px;
        margin-top:10px;
        background:#333;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;">
        ⬅ Back
        </button>

    </div>

    `;

}

// =========================
// ADD TO CART
// =========================
function addToCart(id){

    const product = products.find(p => p.id === id);

    cart.push(product);

    document.getElementById("cartCount").innerText = cart.length;

    alert(product.name + " added to cart.");

}

// =========================
// BUY NOW
// =========================
function buyNow(id){

    const product = products.find(p => p.id === id);

    const msg = `Hello Gimhan Store

Product : ${product.name}
Price : Rs.${product.price}`;

    window.open(
`https://wa.me/94767209940?text=${encodeURIComponent(msg)}`,
"_blank");

}
    // =========================
// UPDATE CART
// =========================
function updateCart() {

    localStorage.setItem("cart", JSON.stringify(cart));

    document.getElementById("cartCount").innerText = cart.length;

    let cartItems = document.getElementById("cartItems");

    cartItems.innerHTML = "";

    if (cart.length === 0) {
        cartItems.innerHTML = "<h3 style='padding:15px'>Cart is Empty</h3>";
        return;
    }

    let total = 0;

    cart.forEach((item, index) => {

        total += item.price;

        cartItems.innerHTML += `

        <div style="
        background:#fff;
        margin:10px;
        padding:10px;
        border-radius:10px;
        box-shadow:0 2px 5px rgba(0,0,0,.1);">

            <img src="${item.image}"
            style="width:100px;border-radius:8px;">

            <h3>${item.name}</h3>

            <p style="color:#ff6600;">
            Rs.${item.price}
            </p>

            <button
            onclick="removeCart(${index})"
            style="
            width:100%;
            padding:10px;
            background:red;
            color:white;
            border:none;
            border-radius:8px;">
            Remove
            </button>

        </div>

        `;

    });

    cartItems.innerHTML += `

    <div style="
    background:#fff;
    margin:10px;
    padding:15px;
    border-radius:10px;">

        <h2>Total : Rs.${total}</h2>

        <button
        onclick="checkoutWhatsApp()"
        style="
        width:100%;
        padding:12px;
        background:#25D366;
        color:white;
        border:none;
        border-radius:8px;">
        💬 Checkout WhatsApp
        </button>

    </div>

    `;

}

// =========================
// LOAD SAVED CART
// =========================
let savedCart = localStorage.getItem("cart");

if(savedCart){

    cart = JSON.parse(savedCart);

    updateCart();

}

// =========================
// REMOVE CART
// =========================
function removeCart(index){

    cart.splice(index,1);

    updateCart();

}

// =========================
// CHECKOUT
// =========================
function checkoutWhatsApp(){

    let msg = "Hello Gimhan Store%0A%0AMy Order:%0A";

    let total = 0;

    cart.forEach(item=>{

        msg += `${item.name} - Rs.${item.price}%0A`;

        total += item.price;

    });

    msg += `%0ATotal : Rs.${total}`;

    window.open(
`https://wa.me/94767209940?text=${msg}`,
"_blank");

}

// =========================
// REPLACE addToCart()
// =========================
function addToCart(id){

    const product = products.find(p=>p.id===id);

    cart.push(product);

    updateCart();

    alert(product.name + " added to cart.");

}

// =========================
// WISHLIST
// =========================
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

function addToWishlist(id){

    const product = products.find(p => p.id === id);

    if(!wishlist.some(item => item.id === id)){

        wishlist.push(product);

        localStorage.setItem("wishlist", JSON.stringify(wishlist));

        alert(product.name + " added to Wishlist ❤️");

    }else{

        alert("Already in Wishlist ❤️");

    }

}

// =========================
// IMAGE ZOOM
// =========================
document.addEventListener("click", function(e){

    if(e.target.tagName === "IMG"){

        e.target.classList.toggle("zoom");

    }

});

// =========================
// BEST SELLERS
// =========================
const bestGrid = document.getElementById("bestGrid");

function loadBestProducts(){

    bestGrid.innerHTML = "";

    products.slice(0,4).forEach(product=>{

        bestGrid.innerHTML += `

        <div class="card" onclick="openProduct(${product.id})">

            <img src="${product.image}">

            <div class="info">

                <div class="title">
                    ${product.name}
                </div>

                <div class="price">
                    Rs.${product.price}
                </div>

            </div>

        </div>

        `;

    });

}

loadBestProducts();

// =========================
// CATEGORY FILTER
// =========================
function filterCategory(category){

    if(category==="all"){

        loadProducts(products);

        return;

    }

    let result = products.filter(product =>
        product.category === category
    );

    loadProducts(result);

}
    // =========================
// DARK MODE
// =========================
let darkMode = localStorage.getItem("darkMode") === "true";

if(darkMode){
    document.body.classList.add("dark");
}

function toggleDarkMode(){

    document.body.classList.toggle("dark");

    localStorage.setItem(
        "darkMode",
        document.body.classList.contains("dark")
    );

}

// =========================
// PRODUCT RATING
// =========================
function stars(rate){

    let html="";

    for(let i=1;i<=5;i++){

        html += i<=rate ? "⭐" : "☆";

    }

    return html;

}

// =========================
// PRODUCT STOCK
// =========================
function stockText(stock){

    if(stock>5){

        return "<span style='color:green'>In Stock</span>";

    }

    if(stock>0){

        return "<span style='color:orange'>Only Few Left</span>";

    }

    return "<span style='color:red'>Out Of Stock</span>";

}

// =========================
// PRODUCT BADGE
// =========================
function badge(product){

    if(product.discount){

        return "<div class='badge'>SALE</div>";

    }

    return "";

}

// =========================
// DISCOUNT PRICE
// =========================
function finalPrice(product){

    if(product.discount){

        return product.price-product.discount;

    }

    return product.price;

}

    /* DARK MODE */

.dark{
    background:#111;
    color:white;
}

.dark .header,
.dark .sidebar,
.dark .card,
.dark .bottomNav{
    background:#222;
    color:white;
}

.dark input{
    background:#333;
    color:white;
    border:1px solid #555;
}

/* BADGE */

.badge{

position:absolute;

top:10px;

left:10px;

background:red;

color:white;

padding:5px 10px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}
    {
    id:1,
    name:"Army Soldier",
    price:5000,
    discount:500,
    stock:10,
    rating:5,
    category:"Army",
    image:"image.jpg",
    description:"High quality product"
}
